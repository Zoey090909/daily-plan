<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>无压每日计划 · 轻灵清单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f1f5f9;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 1.5rem 1rem 2.5rem;
            color: #1e293b;
        }

        /* 主卡片 */
        .plan-card {
            max-width: 680px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* 头部区域 */
        .plan-header {
            padding: 1.8rem 1.8rem 1rem 1.8rem;
            background: white;
            border-bottom: 1px solid #eef2ff;
        }

        .date-section {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .date {
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #2d3e50, #1e2a3a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .weekday {
            font-size: 1rem;
            background: #eef2ff;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #3b6e9e;
            font-weight: 500;
        }

        .greeting {
            font-size: 0.9rem;
            color: #5b6e8c;
            margin-top: 0.4rem;
            border-left: 3px solid #9bb8da;
            padding-left: 0.75rem;
        }

        /* 简洁统计 */
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0 0.2rem;
            background: #f8fafc;
            padding: 0.7rem 1rem;
            border-radius: 1.5rem;
        }

        .task-count {
            font-size: 0.85rem;
            font-weight: 500;
            background: #e2e8f0;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            color: #2c3e4e;
        }

        .encourage {
            font-size: 0.8rem;
            color: #5e7a99;
        }

        /* 任务列表 */
        .task-list {
            padding: 0.8rem 1.2rem;
            max-height: 480px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.85rem 0.6rem;
            margin: 0.2rem 0;
            background: #ffffff;
            border-radius: 1rem;
            transition: all 0.15s;
            border: 1px solid transparent;
        }

        .task-item:hover {
            background: #fefefe;
            border-color: #e2edff;
        }

        /* 复选框自定义 */
        .task-check {
            width: 1.4rem;
            height: 1.4rem;
            accent-color: #6c9bd9;
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.1s;
        }

        .task-text {
            flex: 1;
            font-size: 1rem;
            font-weight: 450;
            line-height: 1.4;
            word-break: break-word;
            color: #1f2a3e;
            transition: 0.2s;
            padding: 0.1rem 0;
        }

        /* 已完成任务样式 */
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .task-actions {
            display: flex;
            gap: 0.4rem;
            flex-shrink: 0;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem 0.4rem;
            border-radius: 0.8rem;
            transition: all 0.1s;
            color: #7c8ba0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: #f0f4f9;
            color: #3b5e7e;
        }

        .icon-btn:active {
            transform: scale(0.96);
        }

        /* 底部添加区 */
        .add-section {
            padding: 1rem 1.5rem 1.5rem;
            background: #ffffff;
            border-top: 1px solid #ecf3fa;
        }

        .input-group {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }

        .task-input {
            flex: 1;
            border: 1px solid #dce5f0;
            border-radius: 2rem;
            padding: 0.75rem 1.2rem;
            font-size: 0.95rem;
            background: #fefefe;
            transition: 0.2s;
            font-family: inherit;
        }

        .task-input:focus {
            outline: none;
            border-color: #9bbfe0;
            box-shadow: 0 0 0 2px rgba(108, 155, 217, 0.2);
        }

        .add-btn {
            background: #eef3fc;
            border: none;
            border-radius: 2rem;
            padding: 0 1.2rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #2c618e;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .add-btn:hover {
            background: #e2ebf6;
            color: #1a4c74;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: space-between;
            align-items: center;
        }

        .sec-btn {
            background: #f8fafd;
            border: 1px solid #e2edf7;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-weight: 480;
            color: #53728e;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .sec-btn:hover {
            background: #ecf3f9;
            border-color: #cbdde9;
            color: #2c5d82;
        }

        .empty-placeholder {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #a5bbd3;
            font-size: 0.9rem;
        }

        /* toast 轻提示 */
        .toast-msg {
            position: fixed;
            bottom: 1.8rem;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1e2f3cee;
            backdrop-filter: blur(8px);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-size: 0.8rem;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 999;
            white-space: nowrap;
            font-weight: 450;
        }

        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* 滚动条舒服一点 */
        .task-list::-webkit-scrollbar {
            width: 4px;
        }

        .task-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: #cbdbe0;
            border-radius: 4px;
        }

        @media (max-width: 500px) {
            .plan-card {
                border-radius: 1.5rem;
            }
            .plan-header {
                padding: 1.2rem 1.2rem 0.8rem;
            }
            .task-item {
                padding: 0.7rem 0.3rem;
            }
            .task-text {
                font-size: 0.92rem;
            }
            .action-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="plan-card">
    <div class="plan-header">
        <div class="date-section">
            <span class="date" id="displayDate"></span>
            <span class="weekday" id="weekday"></span>
        </div>
        <div class="greeting">
            🌱 轻轻松松 · 完成一件就是进步
        </div>
        <div class="stats">
            <span class="task-count" id="pendingCount">0 件待办</span>
            <span class="encourage" id="encourageMsg">✨ 今天也很从容</span>
        </div>
    </div>

    <!-- 任务列表区 -->
    <div class="task-list" id="taskListContainer">
        <!-- 动态渲染 -->
        <div class="empty-placeholder">📋 加载中...</div>
    </div>

    <!-- 底部操作 -->
    <div class="add-section">
        <div class="input-group">
            <input type="text" class="task-input" id="newTaskInput" placeholder="写一件小事，例如「喝杯水」或「深呼吸」" autocomplete="off">
            <button class="add-btn" id="addTaskBtn">+ 添加</button>
        </div>
        <div class="action-buttons">
            <button class="sec-btn" id="copyPlanBtn">📋 挪用清单 (复制文本)</button>
            <button class="sec-btn" id="clearCompletedBtn">✓ 清空已完成</button>
            <button class="sec-btn" id="resetDefaultBtn">🔄 重置示例计划</button>
        </div>
        <div style="font-size: 0.7rem; text-align: center; margin-top: 1rem; color: #9bb1c5;">
            ✔ 可编辑/删除任务 · 自动保存 · 轻松无压
        </div>
    </div>
</div>
<div id="toastMsg" class="toast-msg">✨ 提示</div>

<script>
    // ---------- 预设无压任务 (清晰且简单，完全没有压力) ----------
    const DEFAULT_TASKS = [
        { id: "init1", text: "🚰 喝一杯温水", completed: false },
        { id: "init2", text: "🌿 整理桌面2分钟", completed: false },
        { id: "init3", text: "🧘 伸个懒腰，深呼吸3次", completed: false },
        { id: "init4", text: "📖 读几页喜欢的书（5分钟即可）", completed: false },
        { id: "init5", text: "⭐ 写下今天一件小成就", completed: false },
        { id: "init6", text: "💬 给家人/朋友一句问候", completed: false }
    ];

    // 全局任务数组
    let tasks = [];

    // DOM 元素
    const taskContainer = document.getElementById('taskListContainer');
    const pendingCountSpan = document.getElementById('pendingCount');
    const encourageMsgSpan = document.getElementById('encourageMsg');
    const newTaskInput = document.getElementById('newTaskInput');
    const addBtn = document.getElementById('addTaskBtn');
    const copyBtn = document.getElementById('copyPlanBtn');
    const clearCompletedBtn = document.getElementById('clearCompletedBtn');
    const resetDefaultBtn = document.getElementById('resetDefaultBtn');
    const toastEl = document.getElementById('toastMsg');

    // 辅助函数：显示轻提示 (无压感，不弹窗)
    function showToast(message, duration = 1800) {
        toastEl.textContent = message;
        toastEl.classList.add('show');
        setTimeout(() => {
            toastEl.classList.remove('show');
        }, duration);
    }

    // 保存到 localStorage
    function saveTasksToLocal() {
        localStorage.setItem('calm_daily_plan', JSON.stringify(tasks));
    }

    // 加载本地数据，若无则使用默认
    function loadTasksFromLocal() {
        const stored = localStorage.getItem('calm_daily_plan');
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                if (Array.isArray(parsed) && parsed.length >= 0) {
                    // 确保每个任务对象都有必要的字段，防止旧数据异常
                    tasks = parsed.map(t => ({
                        id: t.id || Date.now() + Math.random(),
                        text: t.text || '未命名任务',
                        completed: t.completed === true
                    }));
                    return;
                }
            } catch(e) { console.warn(e); }
        }
        // 使用默认任务（深拷贝）
        tasks = DEFAULT_TASKS.map(t => ({ ...t, id: t.id + '_' + Date.now() + Math.random() }));
    }

    // 更新统计和鼓励语 (未完成任务数量)
    function updateStatsAndEncourage() {
        const pendingTasks = tasks.filter(t => !t.completed).length;
        const totalTasks = tasks.length;
        pendingCountSpan.innerText = `${pendingTasks} 件待办`;
        
        if (totalTasks === 0) {
            encourageMsgSpan.innerText = '🍃 空空如也，添加一个小任务吧';
        } else if (pendingTasks === 0) {
            encourageMsgSpan.innerText = '🎉 太棒了！今天完美收工，休息一下～';
        } else if (pendingTasks <= 2) {
            encourageMsgSpan.innerText = '🌻 只剩一点点，轻松完成它';
        } else {
            const encourageList = ['💪 按自己的节奏来', '✨ 完成即胜利', '🌸 简单小事也是积累', '🍃 不必完美，行动即可'];
            const randomIdx = Math.floor(Math.random() * encourageList.length);
            encourageMsgSpan.innerText = encourageList[randomIdx];
        }
    }

    // 渲染任务列表 (核心UI)
    function renderTaskList() {
        if (!taskContainer) return;
        
        if (tasks.length === 0) {
            taskContainer.innerHTML = `<div class="empty-placeholder">📭 暂无计划，添加一件轻松的小事吧～</div>`;
            updateStatsAndEncourage();
            saveTasksToLocal();
            return;
        }
        
        let html = '';
        tasks.forEach(task => {
            const completedClass = task.completed ? 'completed' : '';
            // 使用 data-id 来识别
            html += `
                <div class="task-item ${completedClass}" data-task-id="${task.id}">
                    <input type="checkbox" class="task-check" ${task.completed ? 'checked' : ''} data-id="${task.id}">
                    <span class="task-text">${escapeHtml(task.text)}</span>
                    <div class="task-actions">
                        <button class="icon-btn edit-task" data-id="${task.id}" title="编辑任务">✏️</button>
                        <button class="icon-btn delete-task" data-id="${task.id}" title="删除任务">🗑️</button>
                    </div>
                </div>
            `;
        });
        taskContainer.innerHTML = html;
        
        // 绑定 checkbox 变更事件 (委托)
        const checkboxes = document.querySelectorAll('.task-check');
        checkboxes.forEach(cb => {
            cb.removeEventListener('change', handleCheckChange);
            cb.addEventListener('change', handleCheckChange);
        });
        
        // 绑定编辑和删除事件 (委托方式更稳健，但是为了清晰直接重新绑定)
        const editBtns = document.querySelectorAll('.edit-task');
        editBtns.forEach(btn => {
            btn.removeEventListener('click', handleEditClick);
            btn.addEventListener('click', handleEditClick);
        });
        
        const delBtns = document.querySelectorAll('.delete-task');
        delBtns.forEach(btn => {
            btn.removeEventListener('click', handleDeleteClick);
            btn.addEventListener('click', handleDeleteClick);
        });
        
        updateStatsAndEncourage();
        saveTasksToLocal();
    }
    
    // 简单的防XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // 处理复选框变化
    function handleCheckChange(e) {
        const checkbox = e.target;
        const taskId = checkbox.getAttribute('data-id');
        const task = tasks.find(t => t.id === taskId);
        if (task) {
            task.completed = checkbox.checked;
            renderTaskList(); // 重新渲染以更新样式 + 存储
            showToast(task.completed ? '✓ 完成了一件小事，轻松+1' : '↻ 重新标记为待办，慢慢来');
        }
    }
    
    // 编辑任务 (无压弹窗，简单明了)
    function handleEditClick(e) {
        e.stopPropagation();
        const btn = e.currentTarget;
        const taskId = btn.getAttribute('data-id');
        const task = tasks.find(t => t.id === taskId);
        if (task) {
            const newText = prompt('✏️ 修改任务内容（简单清晰就好）', task.text);
            if (newText !== null && newText.trim() !== '') {
                const trimmed = newText.trim();
                task.text = trimmed;
                renderTaskList();
                showToast('📝 任务已更新', 1200);
            } else if (newText !== null && newText.trim() === '') {
                showToast('内容不能为空，未做修改', 1000);
            }
        }
    }
    
    // 删除任务
    function handleDeleteClick(e) {
        e.stopPropagation();
        const btn = e.currentTarget;
        const taskId = btn.getAttribute('data-id');
        const taskIndex = tasks.findIndex(t => t.id === taskId);
        if (taskIndex !== -1) {
            const taskText = tasks[taskIndex].text;
            tasks.splice(taskIndex, 1);
            renderTaskList();
            showToast(`🗑️ 已移除「${taskText.length > 20 ? taskText.slice(0,18)+'…' : taskText}」`, 1200);
        }
    }
    
    // 添加新任务
    function addNewTask() {
        let rawText = newTaskInput.value;
        if (!rawText || rawText.trim() === '') {
            showToast('✨ 写一件简单的事吧，比如「活动肩膀」', 1300);
            return;
        }
        const cleanText = rawText.trim();
        // 限制长度，让界面更友好
        const finalText = cleanText.length > 60 ? cleanText.slice(0, 57) + '...' : cleanText;
        const newTask = {
            id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            text: finalText,
            completed: false
        };
        tasks.unshift(newTask); // 新任务放在前面，更容易看到
        newTaskInput.value = '';
        renderTaskList();
        showToast(`➕ 添加: ${finalText.length > 28 ? finalText.slice(0, 25)+'…' : finalText}`, 1400);
        // 平滑滚动到顶部提醒
        if (taskContainer.firstChild) {
            taskContainer.scrollTop = 0;
        }
    }
    
    // 清空已完成任务 (无压力清理)
    function clearCompletedTasks() {
        const completedTasks = tasks.filter(t => t.completed);
        if (completedTasks.length === 0) {
            showToast('🍃 当前没有已完成的任务', 1000);
            return;
        }
        const confirmClear = confirm(`✨ 确定清空 ${completedTasks.length} 件已完成的任务吗？\n（未完成的任务会保留，轻装上阵）`);
        if (confirmClear) {
            tasks = tasks.filter(t => !t.completed);
            renderTaskList();
            showToast(`🧹 已清理 ${completedTasks.length} 个已完成任务，清爽~`, 1500);
        }
    }
    
    // 重置为默认示例计划 (保留原始轻松任务)
    function resetToDefault() {
        if (tasks.length > 0) {
            const userConfirm = confirm('重置会替换当前所有任务，恢复默认的轻松计划。\n当前任务将丢失，确定重置吗？');
            if (!userConfirm) return;
        }
        // 重置为最初默认任务深拷贝，并生成新id避免冲突
        tasks = DEFAULT_TASKS.map(t => ({
            id: Date.now() + '_' + Math.random() + t.text.slice(0, 3),
            text: t.text,
            completed: false
        }));
        renderTaskList();
        showToast('🌟 已重置为温柔示例计划，可以随意修改', 1600);
    }
    
    // 挪用清单：复制纯文本（无标记，适合粘贴到任何地方，可挪为己用）
    function copyPlainTextList() {
        if (tasks.length === 0) {
            showToast('📭 当前没有任务可复制，先添加一些吧', 1200);
            return;
        }
        // 仅复制任务文本，不包含完成状态，让挪用更自由，无压力
        const taskTexts = tasks.map((task, idx) => {
            // 前缀简单序号，也可以不带序号，但为了排版可读
            return `${idx+1}. ${task.text}`;
        }).join('\n');
        
        // 附加一小行鼓励
        const copyContent = `📋 我的无压计划清单\n${taskTexts}\n—— 可任意调整，轻松完成就好 ——`;
        
        navigator.clipboard.writeText(copyContent).then(() => {
            showToast(`📋 已复制 ${tasks.length} 项计划，可粘贴到任意地方「挪用」`, 1800);
        }).catch(() => {
            showToast('复制失败，手动复制也很方便', 1200);
        });
    }
    
    // 设置日期显示 (让每日计划有仪式感)
    function setDateDisplay() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        const weekday = weekdays[now.getDay()];
        const dateElem = document.getElementById('displayDate');
        const weekdayElem = document.getElementById('weekday');
        if (dateElem) dateElem.innerText = `${year}.${month}.${day}`;
        if (weekdayElem) weekdayElem.innerText = weekday;
    }
    
    // 初始化事件监听 & 首次加载
    function initEventListeners() {
        if (addBtn) addBtn.addEventListener('click', addNewTask);
        if (copyBtn) copyBtn.addEventListener('click', copyPlainTextList);
        if (clearCompletedBtn) clearCompletedBtn.addEventListener('click', clearCompletedTasks);
        if (resetDefaultBtn) resetDefaultBtn.addEventListener('click', resetToDefault);
        // 按回车添加新任务
        if (newTaskInput) {
            newTaskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addNewTask();
                }
            });
        }
    }
    
    // 一键启动应用
    function init() {
        setDateDisplay();
        loadTasksFromLocal();
        initEventListeners();
        renderTaskList();
    }
    
    init();
</script>
</body>
</html>
